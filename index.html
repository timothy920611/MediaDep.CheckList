<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>媒體部門 CheckList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0b09;
      --surface: #141310;
      --card:    #1a1815;
      --border:  #2c2922;
      --accent:  #c8a96e;
      --accent2: #e8d4a8;
      --accent3: #8a6a3a;
      --text:    #ede7da;
      --muted:   #6b6256;
      --dim:     #3a342c;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
    }

    /* ── PAGE SYSTEM ── */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: transform 0.42s cubic-bezier(0.77,0,0.18,1),
                  opacity  0.42s cubic-bezier(0.77,0,0.18,1);
    }
    .page.hidden {
      transform: translateX(100%);
      opacity: 0;
      pointer-events: none;
    }

    /* ── ACCENT LINE ── */
    .accent-line {
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
      flex-shrink: 0;
    }

    /* ════════════════════════
       HOME PAGE
    ════════════════════════ */
    #homePage { overflow: hidden; }

    .home-scroll { flex: 1; overflow-y: auto; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-badge {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 13px;
      color: #0c0b09;
      flex-shrink: 0;
    }

    .logo-text .title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
    .logo-text .sub {
      font-size: 10px; color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.1em; margin-top: 1px;
    }

    .header-right {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 0.1em;
    }

    .home-body {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 10px;
    }

    .home-body h1 {
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 700; line-height: 1.3; letter-spacing: 0.02em;
    }

    .home-body .desc {
      margin-top: 10px; font-size: 13px;
      color: var(--muted); line-height: 1.9; font-weight: 300;
    }

    .divider {
      width: 40px; height: 1px;
      background: var(--accent);
      margin: 28px 0;
    }

    /* Cards */
    .doc-grid { display: flex; flex-direction: column; gap: 12px; }

    .doc-card {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .doc-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s;
    }

    .doc-card:hover { border-color: var(--accent3); background: #1e1c18; transform: translateX(4px); }
    .doc-card:hover::before { transform: scaleY(1); }

    .doc-card:nth-child(1) { animation-delay: 0.05s; }
    .doc-card:nth-child(2) { animation-delay: 0.10s; }
    .doc-card:nth-child(3) { animation-delay: 0.15s; }
    .doc-card:nth-child(4) { animation-delay: 0.20s; }
    .doc-card:nth-child(5) { animation-delay: 0.25s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-num {
      font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--accent);
      width: 20px; text-align: right; flex-shrink: 0;
    }

    .card-icon {
      width: 42px; height: 50px;
      background: var(--dim);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative;
    }
    .card-icon::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 9px; height: 9px;
      background: var(--bg);
      clip-path: polygon(100% 0, 0 0, 100% 100%);
    }
    .card-icon span {
      font-family: 'Space Mono', monospace;
      font-size: 9px; font-weight: 700;
      color: var(--accent); letter-spacing: -0.5px;
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-id {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--muted);
      margin-top: 3px; letter-spacing: 0.06em;
    }

    .card-arrow {
      color: var(--muted); flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }
    .doc-card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

    /* ════════════════════════
       READER PAGE
    ════════════════════════ */
    #readerPage { overflow: hidden; }

    .reader-header {
      display: flex; align-items: center;
      gap: 8px; padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: var(--dim);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent); }

    .reader-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 0.04em;
      flex: 1; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .reader-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .icon-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--dim);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted); cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* Tab switch bar */
    .tab-switch {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
      flex-shrink: 0;
    }
    .tab-switch::-webkit-scrollbar { display: none; }

    .tab-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em;
      color: var(--muted);
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .tab-pill .n {
      width: 16px; height: 16px;
      background: var(--border);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: var(--muted);
    }
    .tab-pill:hover { color: var(--text); }
    .tab-pill.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pill.active .n { background: var(--accent); color: #0c0b09; }

    /* Viewer */
    .viewer-wrap {
      flex: 1; position: relative; overflow: hidden; background: #111;
    }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    .loading-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; background: #111; z-index: 5;
      transition: opacity 0.3s;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 0.12em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════════════════
     HOME PAGE
══════════════════════════ -->
<div class="page" id="homePage">
  <header class="site-header">
    <div class="logo">
      <div class="logo-badge">MD</div>
      <div class="logo-text">
        <div class="title">媒體部門 CheckList</div>
        <div class="sub">MEDIA DEPT · DOCUMENT VIEWER</div>
      </div>
    </div>
    <div class="header-right">5 DOCS</div>
  </header>
  <div class="accent-line"></div>

  <div class="home-scroll">
    <div class="home-body">
      <div class="eyebrow">文件索引</div>
      <h1>媒體部門<br/>作業清單</h1>
      <p class="desc">點選下方任一份文件，進入閱讀模式。</p>
      <div class="divider"></div>
      <div class="doc-grid" id="docGrid"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════
     READER PAGE
══════════════════════════ -->
<div class="page hidden" id="readerPage">

  <div class="reader-header">
    <button class="back-btn" id="backBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      返回
    </button>
    <div class="reader-title" id="readerTitle">—</div>
    <div class="reader-actions">
      <a class="icon-btn" id="openNewTab" href="#" target="_blank" title="新視窗開啟">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
      <a class="icon-btn" id="downloadBtn" href="#" title="下載">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </a>
    </div>
  </div>
  <div class="accent-line"></div>

  <nav class="tab-switch" id="tabSwitch"></nav>

  <div class="viewer-wrap">
    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="loading-label">載入中…</div>
    </div>
    <iframe id="pdfFrame" src="about:blank"></iframe>
  </div>

</div>

<script>
  const BASE = 'https://raw.githubusercontent.com/timothy920611/MediaDep.CheckList/main/';

  const docs = [
    { id: 'S-144',    file: 'S-144_CH.pdf',    label: 'S-144' },
    { id: 'S-178',    file: 'S-178_CH.pdf',    label: 'S-178' },
    { id: 'S-179',    file: 'S-179_CH.pdf',    label: 'S-179' },
    { id: 'S-261',    file: 'S-261_CH.pdf',    label: 'S-261' },
    { id: 'zoominst', file: 'zoominst_CH.pdf', label: 'ZOOM'  },
  ];

  let currentId = null;

  // Build home cards
  const grid = document.getElementById('docGrid');
  docs.forEach((doc, i) => {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.innerHTML = `
      <span class="card-num">0${i+1}</span>
      <div class="card-icon"><span>PDF</span></div>
      <div class="card-info">
        <div class="card-name">${doc.file}</div>
        <div class="card-id">${doc.label}</div>
      </div>
      <svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>`;
    card.addEventListener('click', () => openReader(doc.id));
    grid.appendChild(card);
  });

  // Build tab pills
  const tabSwitch = document.getElementById('tabSwitch');
  docs.forEach((doc, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-pill';
    btn.id = `tab-${doc.id}`;
    btn.innerHTML = `<span class="n">${i+1}</span>${doc.label}`;
    btn.addEventListener('click', () => loadDoc(doc.id));
    tabSwitch.appendChild(btn);
  });

  // Navigate to reader
  function openReader(id) {
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('readerPage').classList.remove('hidden');
    loadDoc(id);
  }

  // Back to home
  document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('readerPage').classList.add('hidden');
    document.getElementById('homePage').classList.remove('hidden');
  });

  // Load PDF
  function loadDoc(id) {
    if (currentId === id) return;
    currentId = id;

    const doc = docs.find(d => d.id === id);
    const rawUrl = BASE + encodeURIComponent(doc.file);
    const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(rawUrl)}&embedded=true`;

    // Update tabs
    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
    const activeTab = document.getElementById(`tab-${id}`);
    activeTab.classList.add('active');
    activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

    // Update header
    document.getElementById('readerTitle').textContent = doc.file;
    document.getElementById('openNewTab').href = rawUrl;
    const dl = document.getElementById('downloadBtn');
    dl.href = rawUrl; dl.download = doc.file;

    // Load
    const loading = document.getElementById('loadingScreen');
    const frame   = document.getElementById('pdfFrame');
    loading.classList.remove('hide');
    frame.src = 'about:blank';

    setTimeout(() => {
      frame.onload = () => loading.classList.add('hide');
      frame.src = viewerUrl;
    }, 80);
  }
</script>
</body>
</html>
