<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>媒體部門 CheckList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0b09;
      --surface: #141310;
      --card:    #1a1815;
      --border:  #2c2922;
      --accent:  #c8a96e;
      --accent2: #e8d4a8;
      --accent3: #8a6a3a;
      --text:    #ede7da;
      --muted:   #6b6256;
      --dim:     #3a342c;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Noto Serif TC', serif;
    }

    /* ── PAGE SYSTEM ── */
    .page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      transition: transform 0.42s cubic-bezier(0.77,0,0.18,1),
                  opacity  0.42s cubic-bezier(0.77,0,0.18,1);
    }
    .page.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

    .accent-line {
      height: 2px; flex-shrink: 0;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
    }

    /* ══════════════════ HOME ══════════════════ */
    #homePage { overflow: hidden; }
    .home-scroll { flex: 1; overflow-y: auto; }

    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-badge {
      width: 38px; height: 38px; background: var(--accent);
      border-radius: 5px; display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px;
      color: #0c0b09; flex-shrink: 0;
    }
    .logo-text .title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
    .logo-text .sub {
      font-size: 10px; color: var(--muted);
      font-family: 'Space Mono', monospace; letter-spacing: 0.1em; margin-top: 1px;
    }
    .header-right { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }

    .home-body { max-width: 640px; margin: 0 auto; padding: 40px 24px 60px; width: 100%; }
    .eyebrow {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
    }
    .home-body h1 { font-size: clamp(24px,6vw,34px); font-weight: 700; line-height: 1.3; letter-spacing: 0.02em; }
    .home-body .desc { margin-top: 10px; font-size: 13px; color: var(--muted); line-height: 1.9; font-weight: 300; }
    .divider { width: 40px; height: 1px; background: var(--accent); margin: 28px 0; }

    .doc-grid { display: flex; flex-direction: column; gap: 12px; }
    .doc-card {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .doc-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); transform: scaleY(0); transform-origin: bottom;
      transition: transform 0.2s;
    }
    .doc-card:hover { border-color: var(--accent3); background: #1e1c18; transform: translateX(4px); }
    .doc-card:hover::before { transform: scaleY(1); }
    .doc-card:nth-child(1){animation-delay:.05s} .doc-card:nth-child(2){animation-delay:.10s}
    .doc-card:nth-child(3){animation-delay:.15s} .doc-card:nth-child(4){animation-delay:.20s}
    .doc-card:nth-child(5){animation-delay:.25s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .card-num { font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); width:20px; text-align:right; flex-shrink:0; }
    .card-icon {
      width:42px; height:50px; background:var(--dim); border-radius:4px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative;
    }
    .card-icon::after {
      content:''; position:absolute; top:0; right:0; width:9px; height:9px;
      background:var(--bg); clip-path:polygon(100% 0,0 0,100% 100%);
    }
    .card-icon span { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; color:var(--accent); letter-spacing:-0.5px; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-size:14px; font-weight:600; letter-spacing:0.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-id { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:0.06em; }
    .card-arrow { color:var(--muted); flex-shrink:0; transition:color 0.2s,transform 0.2s; }
    .doc-card:hover .card-arrow { color:var(--accent); transform:translateX(3px); }

    /* ══════════════════ READER ══════════════════ */
    #readerPage { overflow: hidden; }

    .reader-header {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .back-btn {
      display: flex; align-items: center; gap: 5px; padding: 6px 12px;
      background: var(--dim); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.06em; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent); }
    .reader-title {
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.04em;
      flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .reader-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      background: var(--dim); border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); cursor: pointer; text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* Tab bar */
    .tab-switch {
      display: flex; background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .tab-switch::-webkit-scrollbar { display: none; }
    .tab-pill {
      display: flex; align-items: center; gap: 6px; padding: 10px 16px;
      font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
      color: var(--muted); background: transparent; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
      transition: color 0.15s; flex-shrink: 0;
    }
    .tab-pill .n {
      width: 16px; height: 16px; background: var(--border); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: var(--muted);
    }
    .tab-pill:hover { color: var(--text); }
    .tab-pill.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pill.active .n { background: var(--accent); color: #0c0b09; }

    /* PDF viewer */
    .viewer-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }

    /* Sidebar outline */
    .outline-panel {
      width: 220px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width 0.3s, opacity 0.3s;
    }
    .outline-panel.collapsed { width: 0; opacity: 0; pointer-events: none; }
    .outline-header {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
      flex-shrink: 0;
    }
    .outline-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .outline-list::-webkit-scrollbar { width: 3px; }
    .outline-list::-webkit-scrollbar-thumb { background: var(--border); }
    .outline-item {
      display: block; width: 100%; padding: 8px 14px;
      font-size: 11px; color: var(--text); background: none; border: none;
      text-align: left; cursor: pointer; line-height: 1.4;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .outline-item:hover { background: rgba(200,169,110,0.08); color: var(--accent2); }
    .outline-item.level-1 { padding-left: 24px; font-size: 10px; color: var(--muted); }
    .outline-item.level-2 { padding-left: 34px; font-size: 10px; color: var(--muted); }
    .outline-empty {
      padding: 20px 14px;
      font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
      text-align: center; line-height: 1.8;
    }

    /* Canvas scroll area */
    .canvas-area {
      flex: 1; overflow-y: auto; overflow-x: auto;
      background: #1a1a1a; display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px;
      gap: 12px;
    }
    .canvas-area::-webkit-scrollbar { width: 6px; }
    .canvas-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .page-canvas-wrap {
      position: relative; flex-shrink: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .page-canvas-wrap canvas {
      display: block;
      position: relative;
      z-index: 1;
    }
    .annotationLayer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    .annotationLayer section {
      position: absolute;
    }
    .annotationLayer a,
    .annotationLayer button,
    .annotationLayer input,
    .annotationLayer textarea,
    .annotationLayer select,
    .annotationLayer option {
      pointer-events: auto;
    }

    /* Bottom controls */
    .pdf-controls {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 8px 14px;
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      background: var(--dim); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent); }
    .ctrl-btn:disabled { opacity: 0.35; pointer-events: none; }
    .ctrl-btn svg { width: 13px; height: 13px; }
    .page-info {
      font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
      letter-spacing: 0.08em; min-width: 80px; text-align: center;
    }
    .page-input {
      width: 40px; padding: 4px 6px; text-align: center;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px;
    }
    .page-input:focus { outline: none; border-color: var(--accent); }
    .sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    .outline-toggle-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; height: 30px;
      background: var(--dim); border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); cursor: pointer; font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: 0.06em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .outline-toggle-btn:hover, .outline-toggle-btn.active {
      background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent);
    }
    .outline-toggle-btn svg { width: 12px; height: 12px; }

    /* Loading overlay */
    .loading-screen {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; background: #1a1a1a;
      transition: opacity 0.3s;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .loading-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.12em; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .outline-panel { display: none; }
      .outline-toggle-btn { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ HOME PAGE ══ -->
<div class="page" id="homePage">
  <header class="site-header">
    <div class="logo">
      <div class="logo-badge">MD</div>
      <div class="logo-text">
        <div class="title">媒體部門 CheckList</div>
        <div class="sub">MEDIA DEPT · DOCUMENT VIEWER</div>
      </div>
    </div>
    <div class="header-right">5 DOCS</div>
  </header>
  <div class="accent-line"></div>
  <div class="home-scroll">
    <div class="home-body">
      <div class="eyebrow">文件索引</div>
      <h1>媒體部門<br/>作業清單</h1>
      <p class="desc">點選下方任一份文件，進入閱讀模式。</p>
      <div class="divider"></div>
      <div class="doc-grid" id="docGrid"></div>
    </div>
  </div>
</div>

<!-- ══ READER PAGE ══ -->
<div class="page hidden" id="readerPage">

  <div class="reader-header">
    <button class="back-btn" id="backBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <div class="reader-title" id="readerTitle">—</div>
    <div class="reader-actions">
      <a class="icon-btn" id="openNewTab" href="#" target="_blank" title="新視窗開啟">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
      <a class="icon-btn" id="downloadBtn" href="#" title="下載">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </a>
    </div>
  </div>
  <div class="accent-line"></div>

  <nav class="tab-switch" id="tabSwitch"></nav>

  <div class="viewer-wrap">
    <!-- Outline sidebar -->
    <div class="outline-panel collapsed" id="outlinePanel">
      <div class="outline-header">目錄</div>
      <div class="outline-list" id="outlineList"></div>
    </div>

    <!-- Canvas area -->
    <div class="canvas-area" id="canvasArea">
      <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-label">載入中…</div>
      </div>
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="pdf-controls">
    <button class="outline-toggle-btn" id="outlineToggle" title="目錄">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/>
      </svg>目錄
    </button>
    <div class="sep"></div>
    <button class="ctrl-btn" id="prevBtn" disabled title="上一頁">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <input class="page-input" id="pageInput" type="number" min="1" value="1" />
    <span class="page-info" id="pageInfo">/ —</span>
    <button class="ctrl-btn" id="nextBtn" disabled title="下一頁">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="sep"></div>
    <button class="ctrl-btn" id="zoomOutBtn" title="縮小">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="ctrl-btn" id="zoomInBtn" title="放大">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="ctrl-btn" id="zoomFitBtn" title="符合寬度">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
  </div>

</div>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const docs = [
    { id: 'S-144',    file: 'S-144_CH.pdf',    label: 'S-144' },
    { id: 'S-178',    file: 'S-178_CH.pdf',    label: 'S-178' },
    { id: 'S-179',    file: 'S-179_CH.pdf',    label: 'S-179' },
    { id: 'S-261',    file: 'S-261_CH.pdf',    label: 'S-261' },
    { id: 'zoominst', file: 'zoominst_CH.pdf', label: 'ZOOM'  },
  ];

  // State
  let pdfDoc = null;
  let currentId = null;
  let currentPage = 1;
  let scale = 1.4;
  let outlineOpen = false;
  let scrollSyncRAF = null;

  // Elements
  const canvasArea    = document.getElementById('canvasArea');
  const loadingScreen = document.getElementById('loadingScreen');
  const pageInput     = document.getElementById('pageInput');
  const pageInfo      = document.getElementById('pageInfo');
  const prevBtn       = document.getElementById('prevBtn');
  const nextBtn       = document.getElementById('nextBtn');
  const zoomInBtn     = document.getElementById('zoomInBtn');
  const zoomOutBtn    = document.getElementById('zoomOutBtn');
  const zoomFitBtn    = document.getElementById('zoomFitBtn');
  const outlinePanel  = document.getElementById('outlinePanel');
  const outlineList   = document.getElementById('outlineList');
  const outlineToggle = document.getElementById('outlineToggle');
  const loadingLabel  = loadingScreen.querySelector('.loading-label');

  /* ── Home cards ── */
  const grid = document.getElementById('docGrid');
  docs.forEach((doc, i) => {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.innerHTML = `
      <span class="card-num">0${i+1}</span>
      <div class="card-icon"><span>PDF</span></div>
      <div class="card-info">
        <div class="card-name">${doc.file}</div>
        <div class="card-id">${doc.label}</div>
      </div>
      <svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
    card.addEventListener('click', () => openReader(doc.id));
    grid.appendChild(card);
  });

  /* ── Tab pills ── */
  const tabSwitch = document.getElementById('tabSwitch');
  docs.forEach((doc, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-pill';
    btn.id = `tab-${doc.id}`;
    btn.innerHTML = `<span class="n">${i+1}</span>${doc.label}`;
    btn.addEventListener('click', () => loadDoc(doc.id));
    tabSwitch.appendChild(btn);
  });

  /* ── Navigation ── */
  function openReader(id) {
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('readerPage').classList.remove('hidden');
    loadDoc(id);
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('readerPage').classList.add('hidden');
    document.getElementById('homePage').classList.remove('hidden');
  });

  function clearViewer() {
    Array.from(canvasArea.children).forEach(el => {
      if (!el.classList.contains('loading-screen')) el.remove();
    });
    outlineList.innerHTML = '';
  }

  function setLoading(show, text = '載入中…') {
    loadingLabel.textContent = text;
    loadingScreen.classList.toggle('hide', !show);
  }

  function updateControls() {
    if (!pdfDoc) return;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= pdfDoc.numPages;
    pageInput.value = currentPage;
    pageInfo.textContent = `/ ${pdfDoc.numPages}`;
  }

  function syncPageFromScroll() {
    if (!pdfDoc) return;
    const areaTop = canvasArea.getBoundingClientRect().top + 12;
    let bestPage = currentPage;
    let bestDistance = Infinity;

    document.querySelectorAll('.page-canvas-wrap').forEach(wrap => {
      const rect = wrap.getBoundingClientRect();
      const distance = Math.abs(rect.top - areaTop);
      if (distance < bestDistance) {
        bestDistance = distance;
        bestPage = Number(wrap.dataset.page);
      }
    });

    if (bestPage !== currentPage) {
      currentPage = bestPage;
      updateControls();
    }
  }

  canvasArea.addEventListener('scroll', () => {
    if (scrollSyncRAF) cancelAnimationFrame(scrollSyncRAF);
    scrollSyncRAF = requestAnimationFrame(syncPageFromScroll);
  });

  async function resolveDestination(dest) {
    if (!pdfDoc || !dest) return null;
    const resolved = typeof dest === 'string' ? await pdfDoc.getDestination(dest) : dest;
    if (!resolved || !resolved.length) return null;
    const target = resolved[0];
    if (typeof target === 'object' && target !== null) {
      return (await pdfDoc.getPageIndex(target)) + 1;
    }
    if (Number.isInteger(target)) return target;
    return null;
  }

  async function goToDestination(dest) {
    const pageNum = await resolveDestination(dest);
    if (pageNum) goToPage(pageNum);
  }

  /* ── Load PDF ── */
  async function loadDoc(id) {
    if (currentId === id && pdfDoc) return;
    currentId = id;
    currentPage = 1;
    pdfDoc = null;

    const doc = docs.find(d => d.id === id);
    if (!doc) return;

    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
    const activeTab = document.getElementById(`tab-${id}`);
    activeTab.classList.add('active');
    activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

    document.getElementById('readerTitle').textContent = doc.file;
    document.getElementById('openNewTab').href = doc.file;
    const dl = document.getElementById('downloadBtn');
    dl.href = doc.file;
    dl.download = doc.file;

    prevBtn.disabled = true;
    nextBtn.disabled = true;
    pageInput.value = 1;
    pageInput.max = 1;
    pageInfo.textContent = '/ —';
    clearViewer();
    setLoading(true, '載入中…');

    try {
      pdfDoc = await pdfjsLib.getDocument(doc.file).promise;
      const total = pdfDoc.numPages;
      pageInput.max = total;
      pageInfo.textContent = `/ ${total}`;

      for (let i = 1; i <= total; i++) {
        loadingLabel.textContent = `載入中… (${i}/${total})`;
        await renderPage(i, { scrollTo: false });
      }

      setLoading(false);
      currentPage = 1;
      updateControls();
      await buildOutline(pdfDoc);
      canvasArea.scrollTop = 0;
    } catch (e) {
      setLoading(true, '載入失敗，請重試');
      console.error(e);
    }
  }

  function createLinkEl(annotation, viewport, pageNum) {
    const rect = viewport.convertToViewportRectangle(annotation.rect);
    const x1 = Math.min(rect[0], rect[2]);
    const y1 = Math.min(rect[1], rect[3]);
    const x2 = Math.max(rect[0], rect[2]);
    const y2 = Math.max(rect[1], rect[3]);

    const link = document.createElement('a');
    link.style.left = `${x1}px`;
    link.style.top = `${y1}px`;
    link.style.width = `${x2 - x1}px`;
    link.style.height = `${y2 - y1}px`;
    link.style.position = 'absolute';
    link.style.display = 'block';
    link.style.pointerEvents = 'auto';
    link.style.background = 'transparent';
    link.style.cursor = 'pointer';
    link.setAttribute('aria-label', annotation.contents || '連結');

    if (annotation.url) {
      link.href = annotation.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      return link;
    }

    if (annotation.dest) {
      link.href = '#';
      link.addEventListener('click', async (e) => {
        e.preventDefault();
        await goToDestination(annotation.dest);
      });
      return link;
    }

    if (annotation.action === 'GoToPage' && annotation.dest) {
      link.href = '#';
      link.addEventListener('click', async (e) => {
        e.preventDefault();
        await goToDestination(annotation.dest);
      });
      return link;
    }

    if (annotation.action === 'URI' && annotation.url) {
      link.href = annotation.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      return link;
    }

    link.href = '#';
    return link;
  }

  /* ── Render a single page ── */
  async function renderPage(num, { scrollTo = false } = {}) {
    if (!pdfDoc) return null;

    const existing = canvasArea.querySelector(`[data-page="${num}"]`);
    if (existing) {
      if (scrollTo) existing.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return existing;
    }

    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const wrap = document.createElement('div');
    wrap.className = 'page-canvas-wrap';
    wrap.dataset.page = num;

    const annotationLayer = document.createElement('div');
    annotationLayer.className = 'annotationLayer';

    wrap.appendChild(canvas);
    wrap.appendChild(annotationLayer);
    canvasArea.appendChild(wrap);

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport,
    }).promise;

    try {
      const annotations = await page.getAnnotations({ intent: 'display' });
      const linkAnnotations = annotations.filter(a => a.subtype === 'Link');
      annotationLayer.innerHTML = '';
      linkAnnotations.forEach(annotation => {
        const link = createLinkEl(annotation, viewport, num);
        annotationLayer.appendChild(link);
      });
    } catch (err) {
      console.warn('Annotation render skipped:', err);
    }

    if (scrollTo) {
      wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    return wrap;
  }

  function pageElement(n) {
    return canvasArea.querySelector(`[data-page="${n}"]`);
  }

  /* ── Page controls ── */
  prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
  nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

  pageInput.addEventListener('change', () => {
    const n = parseInt(pageInput.value, 10);
    if (pdfDoc && n >= 1 && n <= pdfDoc.numPages) goToPage(n);
  });

  async function goToPage(n) {
    if (!pdfDoc) return;
    n = Math.max(1, Math.min(n, pdfDoc.numPages));
    currentPage = n;
    updateControls();

    const el = pageElement(n);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  /* ── Zoom ── */
  zoomInBtn.addEventListener('click',  () => reScale(scale + 0.2));
  zoomOutBtn.addEventListener('click', () => reScale(Math.max(0.4, scale - 0.2)));
  zoomFitBtn.addEventListener('click', () => {
    const areaW = canvasArea.clientWidth - 32;
    if (!pdfDoc) return;
    pdfDoc.getPage(currentPage).then(page => {
      const vp = page.getViewport({ scale: 1 });
      reScale(areaW / vp.width);
    });
  });

  async function reScale(newScale) {
    if (!pdfDoc) return;
    const keepPage = currentPage;
    scale = newScale;
    clearViewer();
    setLoading(true, '重新縮放中…');

    try {
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        loadingLabel.textContent = `重新縮放中… (${i}/${pdfDoc.numPages})`;
        await renderPage(i, { scrollTo: false });
      }
      setLoading(false);
      currentPage = keepPage;
      updateControls();
      const el = pageElement(keepPage);
      if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
    } catch (err) {
      console.error(err);
      setLoading(true, '縮放失敗，請重試');
    }
  }

  /* ── Outline / TOC ── */
  async function buildOutline(pdf) {
    const outline = await pdf.getOutline();
    outlineList.innerHTML = '';

    if (!outline || outline.length === 0) {
      outlineList.innerHTML = '<div class="outline-empty">此文件<br/>無目錄</div>';
      return;
    }

    async function jumpToItem(item) {
      if (!item.dest) return;
      await goToDestination(item.dest);
    }

    function addItems(items, level) {
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = `outline-item${level > 0 ? ` level-${level}` : ''}`;
        btn.textContent = item.title;
        btn.addEventListener('click', () => jumpToItem(item));
        outlineList.appendChild(btn);
        if (item.items && item.items.length) addItems(item.items, level + 1);
      });
    }

    addItems(outline, 0);
  }

  outlineToggle.addEventListener('click', () => {
    outlineOpen = !outlineOpen;
    outlinePanel.classList.toggle('collapsed', !outlineOpen);
    outlineToggle.classList.toggle('active', outlineOpen);
  });

  /* ── Keyboard nav ── */
  document.addEventListener('keydown', e => {
    if (document.getElementById('readerPage').classList.contains('hidden')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(currentPage + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goToPage(currentPage - 1);
  });
</script>
</body>
</html>
